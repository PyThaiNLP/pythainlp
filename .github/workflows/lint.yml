name: Lint

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**.cff'
      - '**.json'
      - '**.md'
      - '**.rst'
      - '**.txt'
      - '**.yml'
      - 'docs/**'
  pull_request:
    branches:
      - dev
    paths-ignore:
      - '**.cff'
      - '**.json'
      - '**.md'
      - '**.rst'
      - '**.txt'
      - '**.yml'
      - 'docs/**'

# Avoid duplicate runs for the same workflow and Git ref.
# With cancel-in-progress: true, a new run for the same ref cancels any in-progress run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Ruff
      uses: astral-sh/ruff-action@v3
      with:
        src: "./pythainlp ./tests ./examples"
        args: check --verbose --config pyproject.toml
