name: Lint

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**.cff'
      - '**.json'
      - '**.md'
      - '**.rst'
      - '**.txt'
      - '**.yml'
      - 'docs/**'
  pull_request:
    branches:
      - dev
    paths-ignore:
      - '**.cff'
      - '**.json'
      - '**.md'
      - '**.rst'
      - '**.txt'
      - '**.yml'
      - 'docs/**'

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Ruff
      uses: astral-sh/ruff-action@v3
      with:
        src: "./pythainlp ./tests ./examples"
        args: check --verbose --config pyproject.toml
