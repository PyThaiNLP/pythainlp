# Publish versioned documentation to PyThaiNLP/docs when a release is published.
#
# On each GitHub release:
#   1. Copy PyThaiNLP/dev-docs to PyThaiNLP/docs/{version}/.
#   2. Regenerate PyThaiNLP/docs/index.html to list all released versions.
#   3. Inject the new version entry into PyThaiNLP/dev-docs/index.html.

name: Publish versioned docs

on:
  release:
    types: [published]

jobs:
  publish-versioned-docs:
    name: Publish versioned documentation
    runs-on: ubuntu-latest
    # Only run for the main repository, not forks.
    if: github.repository == 'PyThaiNLP/pythainlp'
    permissions:
      contents: read

    steps:
    - name: Get version from release tag
      id: version
      # Strip the leading 'v' from the tag name, e.g. 'v5.3.1' -> '5.3.1'.
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Checkout pythainlp (for scripts)
      uses: actions/checkout@v6
      with:
        path: pythainlp

    - name: Checkout dev-docs repository
      uses: actions/checkout@v6
      with:
        repository: PyThaiNLP/dev-docs
        token: ${{ secrets.PERSONAL_TOKEN }}
        path: dev-docs

    - name: Checkout docs repository
      uses: actions/checkout@v6
      with:
        repository: PyThaiNLP/docs
        token: ${{ secrets.PERSONAL_TOKEN }}
        path: docs

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Copy dev-docs to versioned directory in docs
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        mkdir -p "docs/${VERSION}"
        rsync -a --delete --exclude='.git' dev-docs/ "docs/${VERSION}/"

    - name: Update docs index and dev-docs version list
      run: |
        python pythainlp/build_tools/github/update_docs_index.py \
          --docs-dir docs \
          --dev-docs-index dev-docs/index.html \
          --version "${{ steps.version.outputs.version }}"

    - name: Commit and push updated docs
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        cd docs
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git diff --staged --quiet || \
          git commit -m "Add docs for version ${VERSION}"
        git push

    - name: Commit and push updated dev-docs index
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        cd dev-docs
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add index.html
        git diff --staged --quiet || \
          git commit -m "Update version list for release ${VERSION}"
        git push
