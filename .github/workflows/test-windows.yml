name: Unit test and code coverage (Windows)

on:
  push:
    paths-ignore:
      - '**.md'
      - '**.yml'
      - 'docs/**'
  pull_request:
    branches:
      - dev
    paths-ignore:
      - '**.md'
      - '**.yml'
      - 'docs/**'

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        python-version: ["3.10"]

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        auto-activate-base: true
        auto-update-conda: true
    - shell: powershell
      run: |
        conda info
        conda list
    - name: Install dependencies
      shell: powershell
      env:
        SKLEARN_ALLOW_DEPRECATED_SKLEARN_PACKAGE_INSTALL: True
      run: |
        python -m pip install --disable-pip-version-check --user --upgrade pip==24.0 setuptools
        python -m pip --version
        python -m pip install pytest coverage coveralls
        conda install -y -c conda-forge fairseq
        python -m pip install -r docker_requirements.txt
        python -m pip install .[full]
        python -m nltk.downloader omw-1.4
    - name: Test
      shell: powershell
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COVERALLS_SERVICE_NAME: github
      run: |
        coverage run -m unittest discover
        coveralls
